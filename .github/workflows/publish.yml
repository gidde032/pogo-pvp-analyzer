name: publish

# Triggered when a version tag like v0.1.0 is pushed. Builds the wheel +
# sdist with `python -m build` and uploads them to PyPI via the official
# pypa action. The PyPI API token must be stored as the repository
# secret ``PYPI_API_TOKEN`` — never commit it to the workflow file.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for trusted publishing via OIDC; safe to keep even if we
      # fall back to the API-token path below.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify the tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match pyproject.toml version $VERSION"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
